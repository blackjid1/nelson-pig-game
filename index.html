<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pig game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="row">
      <div class="win player-winner left player--0">
        <div class="left-side">
          <h1 class="player0">PLAYER 1</h1>
          <p class="total-score0">0</p>
          <div class="winner0">WINNER 🎉</div>
        </div>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--0">0</p>
        </div>
        <button class="btn new-game">🔁 NEW GAME</button>
        <button class="btn dice">🎲 ROLL DICE</button>
        <button class="btn hold">🕹️ HOLD</button>
        <img src="dice-1.png" alt="Dice" class="dices" />
      </div>
      <div class="right player--1">
        <div class="right-side">
          <h1 class="player1">PLAYER 2</h1>
          <p class="total-score1">0</p>
          <div class="winner1">WINNER 🎉</div>
        </div>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--1">0</p>
        </div>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
